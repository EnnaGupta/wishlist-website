version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wishlist_db
    environment:
      POSTGRES_DB: wishlist
      POSTGRES_USER: wishlist_user
      POSTGRES_PASSWORD: wishlist_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wishlist_user -d wishlist"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    container_name: wishlist_migrate
    command: python manage.py migrate
    environment:
      DATABASE_URL: postgres://wishlist_user:wishlist_pass@db:5432/wishlist
      SECRET_KEY: django-docker-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    container_name: wishlist_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://wishlist_user:wishlist_pass@db:5432/wishlist
      SECRET_KEY: django-docker-secret-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,https://www.amazon.in,https://www.amazon.com,https://www.flipkart.com
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
